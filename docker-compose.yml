version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: aurum_db
    environment:
      POSTGRES_USER: aurum_admin
      POSTGRES_PASSWORD: aurum_password
      POSTGRES_DB: aurum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  # (Backend and Frontend can be added later once they are containerized)

volumes:
  postgres_data:
